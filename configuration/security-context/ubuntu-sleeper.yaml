---
apiVersion: v1
kind: Pod
metadata:
  name: ubuntu-sleeper
  namespace: default
spec:
  securityContext:      # Update securityContext
    runAsUser: 1010
    capabilities:
        add: ["SYS_TIME", "NET_ADMIN"]
  containers:
  - command:
    - sleep
    - "4800"
    image: ubuntu
    name: ubuntu-sleeper